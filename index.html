<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写一封情书给你</title>
<style>
/* ===== Design System ===== */
:root {
  /* Colors - Romantic Palette */
  --rose: 350 85% 65%;
  --rose-light: 350 85% 72%;
  --rose-dark: 350 60% 48%;
  --rose-glow: 350 85% 75%;
  --peach: 15 90% 75%;
  --peach-light: 15 90% 88%;
  --cream: 30 50% 97%;
  --warm-white: 30 40% 99%;
  --gold: 40 60% 55%;
  --text-primary: 345 40% 22%;
  --text-secondary: 345 20% 40%;
  --text-muted: 345 15% 55%;
  --border-soft: 350 40% 88%;
  --card-bg: 0 0% 100%;
  --card-shadow: 0 8px 40px hsl(350 60% 60% / 0.12);
  --card-shadow-lg: 0 20px 60px hsl(350 60% 60% / 0.18);
  --button-shadow: 0 6px 24px hsl(350 85% 65% / 0.35);
  --button-shadow-hover: 0 10px 32px hsl(350 85% 65% / 0.5);

  /* Gradients */
  --gradient-bg: linear-gradient(170deg, hsl(350 70% 97%) 0%, hsl(15 80% 95%) 40%, hsl(30 50% 97%) 100%);
  --gradient-card: linear-gradient(180deg, hsl(0 0% 100%) 0%, hsl(30 40% 99%) 100%);
  --gradient-button: linear-gradient(135deg, hsl(350 85% 65%) 0%, hsl(350 75% 58%) 100%);
  --gradient-heart: linear-gradient(135deg, hsl(350 85% 65%) 0%, hsl(0 70% 55%) 100%);

  /* Spacing */
  --space-xs: 8px;
  --space-sm: 16px;
  --space-md: 24px;
  --space-lg: 32px;
  --space-xl: 48px;
  --space-2xl: 64px;

  /* Typography */
  --font-display: 'Georgia', 'Noto Serif SC', 'STSong', serif;
  --font-body: 'Georgia', 'Noto Serif SC', 'STSong', serif;

  /* Animation */
  --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bounce: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ===== Reset & Base ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background: var(--gradient-bg);
  color: hsl(var(--text-primary));
  min-height: 100vh;
  min-height: 100dvh;
  line-height: 1.7;
  overflow-x: hidden;
  position: relative;
}

/* ===== Floating Hearts Background ===== */
.hearts-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.heart-float {
  position: absolute;
  bottom: -40px;
  font-size: 20px;
  animation: floatUp linear infinite;
  opacity: 0.35;
  filter: blur(0.5px);
}

@keyframes floatUp {
  0% {
    transform: translateY(0) rotate(0deg) scale(0.7);
    opacity: 0;
  }
  10% {
    opacity: 0.35;
  }
  90% {
    opacity: 0.3;
  }
  100% {
    transform: translateY(-110vh) rotate(360deg) scale(1.3);
    opacity: 0;
  }
}

/* Generate floating hearts with different durations and positions */
.heart-float:nth-child(1)  { left: 5%;  animation-duration: 12s; animation-delay: 0s; font-size: 16px; }
.heart-float:nth-child(2)  { left: 15%; animation-duration: 15s; animation-delay: 2s; font-size: 22px; }
.heart-float:nth-child(3)  { left: 25%; animation-duration: 10s; animation-delay: 4s; font-size: 18px; }
.heart-float:nth-child(4)  { left: 35%; animation-duration: 14s; animation-delay: 1s; font-size: 24px; }
.heart-float:nth-child(5)  { left: 45%; animation-duration: 11s; animation-delay: 5s; font-size: 16px; }
.heart-float:nth-child(6)  { left: 55%; animation-duration: 16s; animation-delay: 3s; font-size: 20px; }
.heart-float:nth-child(7)  { left: 65%; animation-duration: 13s; animation-delay: 7s; font-size: 18px; }
.heart-float:nth-child(8)  { left: 75%; animation-duration: 9s;  animation-delay: 2s; font-size: 22px; }
.heart-float:nth-child(9)  { left: 85%; animation-duration: 17s; animation-delay: 6s; font-size: 16px; }
.heart-float:nth-child(10) { left: 92%; animation-duration: 12s; animation-delay: 4s; font-size: 20px; }
.heart-float:nth-child(11) { left: 10%; animation-duration: 14s; animation-delay: 8s; font-size: 14px; }
.heart-float:nth-child(12) { left: 40%; animation-duration: 11s; animation-delay: 9s; font-size: 18px; }
.heart-float:nth-child(13) { left: 60%; animation-duration: 15s; animation-delay: 5s; font-size: 20px; }
.heart-float:nth-child(14) { left: 78%; animation-duration: 10s; animation-delay: 3s; font-size: 16px; }
.heart-float:nth-child(15) { left: 50%; animation-duration: 13s; animation-delay: 1s; font-size: 22px; }

/* ===== Main Container ===== */
.app-container {
  position: relative;
  z-index: 1;
  max-width: 560px;
  margin: 0 auto;
  padding: var(--space-xl) var(--space-sm);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ===== Scene: both form and view ===== */
.scene {
  display: none;
  animation: fadeSlideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.scene.active {
  display: block;
}

@keyframes fadeSlideIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== Card ===== */
.card {
  background: var(--gradient-card);
  border-radius: 24px;
  padding: var(--space-lg);
  box-shadow: var(--card-shadow);
  border: 1px solid hsl(var(--border-soft));
}

.card-lg {
  padding: var(--space-xl) var(--space-lg);
  box-shadow: var(--card-shadow-lg);
}

/* ===== Form Styles ===== */
.form-header {
  text-align: center;
  margin-bottom: var(--space-lg);
}

.envelope-icon {
  font-size: 56px;
  display: block;
  margin-bottom: var(--space-sm);
  animation: gentleBounce 2s ease-in-out infinite;
}

@keyframes gentleBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.form-title {
  font-family: var(--font-display);
  font-size: 1.75rem;
  font-weight: 700;
  background: var(--gradient-heart);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: var(--space-xs);
  letter-spacing: 0.02em;
}

.form-subtitle {
  font-size: 0.95rem;
  color: hsl(var(--text-muted));
  font-weight: 400;
}

.form-group {
  margin-bottom: var(--space-md);
}

.form-label {
  display: block;
  font-size: 0.9rem;
  font-weight: 600;
  color: hsl(var(--text-secondary));
  margin-bottom: var(--space-xs);
  letter-spacing: 0.01em;
}

.form-label .required {
  color: hsl(var(--rose));
  margin-left: 2px;
}

.form-input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid hsl(var(--border-soft));
  border-radius: 14px;
  font-size: 1rem;
  font-family: var(--font-body);
  color: hsl(var(--text-primary));
  background: hsl(var(--warm-white));
  transition: var(--transition-smooth);
  outline: none;
}

.form-input:focus {
  border-color: hsl(var(--rose-light));
  box-shadow: 0 0 0 4px hsl(350 85% 65% / 0.1);
}

.form-input::placeholder {
  color: hsl(var(--text-muted));
  font-size: 0.9rem;
}

.form-textarea {
  min-height: 160px;
  resize: vertical;
  line-height: 1.8;
}

.form-hint {
  font-size: 0.8rem;
  color: hsl(var(--text-muted));
  margin-top: 6px;
}

/* ===== Button ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 36px;
  font-size: 1.05rem;
  font-weight: 600;
  font-family: var(--font-body);
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: var(--transition-bounce);
  text-decoration: none;
  letter-spacing: 0.02em;
  outline: none;
  position: relative;
  overflow: hidden;
}

.btn-primary {
  background: var(--gradient-button);
  color: white;
  box-shadow: var(--button-shadow);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: var(--button-shadow-hover);
}

.btn-primary:active {
  transform: translateY(0);
  box-shadow: var(--button-shadow);
}

.btn-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 100%);
  opacity: 0;
  transition: opacity 0.3s;
}

.btn-primary:hover::after {
  opacity: 1;
}

.btn-full {
  width: 100%;
}

.btn-secondary {
  background: white;
  color: hsl(var(--rose));
  border: 2px solid hsl(var(--border-soft));
}

.btn-secondary:hover {
  border-color: hsl(var(--rose-light));
  background: hsl(350 85% 97%);
  transform: translateY(-2px);
}

/* ===== Button with heart icon ===== */
.btn-heart-icon {
  display: inline-block;
  animation: heartPulse 1.5s ease-in-out infinite;
}

@keyframes heartPulse {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.25); }
  30% { transform: scale(1); }
  45% { transform: scale(1.2); }
  60% { transform: scale(1); }
}

/* ===== Share Link Box ===== */
.share-box {
  margin-top: var(--space-md);
  padding: var(--space-md);
  background: hsl(350 85% 97%);
  border-radius: 14px;
  border: 1px dashed hsl(var(--rose-light));
  text-align: center;
  animation: fadeSlideIn 0.5s ease;
}

.share-box-label {
  font-size: 0.85rem;
  color: hsl(var(--text-secondary));
  margin-bottom: var(--space-sm);
  font-weight: 600;
}

.share-link-display {
  display: flex;
  align-items: center;
  gap: 8px;
  background: white;
  padding: 12px 16px;
  border-radius: 12px;
  border: 2px solid hsl(var(--border-soft));
  word-break: break-all;
  text-align: left;
  font-size: 0.85rem;
  color: hsl(var(--text-secondary));
  margin-bottom: var(--space-sm);
  font-family: monospace;
}

.btn-copy {
  padding: 10px 24px;
  font-size: 0.9rem;
  border-radius: 12px;
}

.copied-toast {
  display: inline-block;
  font-size: 0.8rem;
  color: hsl(150 60% 40%);
  font-weight: 600;
  animation: fadeInOut 2s ease forwards;
  opacity: 0;
}

@keyframes fadeInOut {
  0% { opacity: 0; transform: translateY(4px); }
  15% { opacity: 1; transform: translateY(0); }
  75% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-4px); }
}

/* ===== Envelope Opening Scene ===== */
.envelope-scene {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
  animation: fadeSlideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.envelope-scene.active {
  display: flex;
}

.envelope-container {
  position: relative;
  width: 280px;
  height: 200px;
  cursor: pointer;
  transition: transform 0.3s ease;
  margin-bottom: var(--space-lg);
}

.envelope-container:hover {
  transform: scale(1.05);
}

.envelope-body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, hsl(350 85% 75%) 0%, hsl(350 75% 68%) 100%);
  border-radius: 12px;
  box-shadow: 0 8px 32px hsl(350 60% 60% / 0.25);
  overflow: hidden;
}

.envelope-flap {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 50%;
  background: linear-gradient(135deg, hsl(350 85% 70%) 0%, hsl(350 75% 63%) 100%);
  clip-path: polygon(0 0, 50% 100%, 100% 0);
  transform-origin: top center;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 2;
}

.envelope-container.opened .envelope-flap {
  transform: rotateX(180deg);
}

.envelope-heart-seal {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 48px;
  color: white;
  filter: drop-shadow(0 2px 8px hsl(350 85% 65% / 0.4));
  animation: heartPulse 2s ease-in-out infinite;
  z-index: 3;
  transition: opacity 0.4s ease;
}

.envelope-container.opened .envelope-heart-seal {
  opacity: 0;
}

.envelope-letter-preview {
  position: absolute;
  top: 10%;
  left: 10%;
  width: 80%;
  height: 80%;
  background: white;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
  transform: translateY(0);
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
  z-index: 1;
}

.envelope-container.opened .envelope-letter-preview {
  transform: translateY(-60px);
}

.envelope-hint {
  font-size: 1rem;
  color: hsl(var(--text-muted));
  text-align: center;
  animation: fadeInOut 3s ease-in-out infinite;
  margin-top: var(--space-md);
}

@keyframes fadeInOut {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ===== Love Letter View ===== */
.love-letter-scene {
  text-align: center;
}

.love-letter-card {
  background: var(--gradient-card);
  border-radius: 24px;
  padding: var(--space-xl) var(--space-lg);
  box-shadow: var(--card-shadow-lg);
  border: 1px solid hsl(var(--border-soft));
  position: relative;
  overflow: hidden;
}

.love-letter-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--gradient-heart);
  border-radius: 24px 24px 0 0;
}

.love-letter-header {
  margin-bottom: var(--space-lg);
}

.heart-big {
  font-size: 64px;
  display: block;
  animation: heartPulse 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px hsl(350 85% 65% / 0.3));
  margin-bottom: var(--space-sm);
}

.recipient-name {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 700;
  background: var(--gradient-heart);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: var(--space-xs);
}

.greeting-prefix {
  font-size: 0.95rem;
  color: hsl(var(--text-muted));
}

.love-letter-content {
  background: hsl(30 30% 98%);
  border-radius: 16px;
  padding: var(--space-lg);
  margin: var(--space-md) 0;
  text-align: left;
  line-height: 2;
  font-size: 1.05rem;
  color: hsl(var(--text-primary));
  white-space: pre-wrap;
  word-break: break-word;
  border: 1px solid hsl(var(--border-soft));
  position: relative;
}

.love-letter-content::before {
  content: '"';
  position: absolute;
  top: -4px;
  left: 12px;
  font-size: 48px;
  color: hsl(var(--rose-light));
  opacity: 0.3;
  font-family: var(--font-display);
  line-height: 1;
}

/* ===== Typewriter effect ===== */
.typewriter-line {
  display: block;
  opacity: 0;
  transform: translateY(8px);
  animation: lineReveal 0.5s ease forwards;
  min-height: 1.2em;
}

.typewriter-line:empty {
  min-height: 0.8em;
}

@keyframes lineReveal {
  0% {
    opacity: 0;
    transform: translateY(12px);
    filter: blur(2px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}

/* Character-by-character reveal */
.char-container {
  line-height: 2;
  font-size: 1.05rem;
}

.typewriter-char {
  display: inline-block;
  opacity: 0;
  animation: charFadeIn 0.6s ease forwards;
  color: hsl(var(--text-primary));
  transition: color 0.3s ease;
}

@keyframes charFadeIn {
  0% {
    opacity: 0;
    color: hsl(350 85% 75% / 0.2);
    transform: scale(0.95);
  }
  50% {
    opacity: 0.5;
    color: hsl(350 85% 65% / 0.6);
  }
  100% {
    opacity: 1;
    color: hsl(var(--text-primary));
    transform: scale(1);
  }
}

.typewriter-cursor {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: hsl(var(--rose));
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: cursorBlink 0.8s ease-in-out infinite;
}

@keyframes cursorBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Scroll unfurl decoration */
.scroll-unfurl {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 2px;
  background: var(--gradient-heart);
  border-radius: 1px;
  animation: unfurlLine 1.2s ease forwards;
  animation-delay: 0.3s;
  z-index: 1;
}

@keyframes unfurlLine {
  0% { width: 0; opacity: 0; }
  30% { opacity: 1; }
  100% { width: 80%; opacity: 0.4; }
}

.love-letter-footer {
  margin-top: var(--space-lg);
  text-align: right;
  font-size: 1rem;
  color: hsl(var(--text-secondary));
  font-style: italic;
}

.sender-name {
  font-weight: 600;
  color: hsl(var(--rose-dark));
  font-style: normal;
}

.love-letter-date {
  font-size: 0.8rem;
  color: hsl(var(--text-muted));
  margin-top: 4px;
}

/* ===== Decorative ornaments ===== */
.ornament-top, .ornament-bottom {
  text-align: center;
  font-size: 14px;
  color: hsl(var(--rose-light));
  letter-spacing: 8px;
  opacity: 0.5;
  margin: var(--space-sm) 0;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: var(--space-md) 0;
  color: hsl(var(--border-soft));
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, hsl(var(--border-soft)), transparent);
}

.divider-heart {
  font-size: 14px;
  opacity: 0.5;
}

/* ===== View actions ===== */
.view-actions {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: var(--space-lg);
  justify-content: center;
}

.btn-outline-rose {
  background: white;
  color: hsl(var(--rose));
  border: 2px solid hsl(var(--rose-light));
  font-size: 0.95rem;
  padding: 12px 24px;
}

.btn-outline-rose:hover {
  background: hsl(var(--rose));
  color: white;
  border-color: hsl(var(--rose));
  transform: translateY(-2px);
}

/* ===== Confetti hearts (view mode) ===== */
.confetti-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}

.confetti-heart {
  position: absolute;
  font-size: 20px;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  0% {
    transform: translateY(-8vh) rotate(0deg) scale(0);
    opacity: 0;
  }
  8% {
    transform: translateY(0vh) rotate(15deg) scale(1.2);
    opacity: 0.9;
  }
  25% {
    transform: translateY(25vh) translateX(15px) rotate(120deg) scale(1);
    opacity: 0.8;
  }
  50% {
    transform: translateY(50vh) translateX(-10px) rotate(240deg) scale(0.9);
    opacity: 0.6;
  }
  75% {
    transform: translateY(75vh) translateX(8px) rotate(320deg) scale(0.7);
    opacity: 0.35;
  }
  100% {
    transform: translateY(110vh) translateX(-5px) rotate(380deg) scale(0.4);
    opacity: 0;
  }
}

/* Click/touch generated hearts */
.click-heart {
  animation: clickHeartFloat 2s ease-out forwards !important;
}

@keyframes clickHeartFloat {
  0% {
    transform: translateY(0) scale(0) rotate(0deg);
    opacity: 0;
  }
  10% {
    transform: translateY(-20px) scale(1.2) rotate(10deg);
    opacity: 1;
  }
  50% {
    transform: translateY(-60px) scale(1) rotate(-15deg);
    opacity: 0.8;
  }
  100% {
    transform: translateY(-120px) scale(0.6) rotate(-30deg);
    opacity: 0;
  }
}

/* ===== Create another button ===== */
.create-another {
  display: block;
  text-align: center;
  margin-top: var(--space-lg);
  font-size: 0.9rem;
}

.create-another a {
  color: hsl(var(--rose));
  text-decoration: none;
  font-weight: 600;
  transition: var(--transition-smooth);
}

.create-another a:hover {
  color: hsl(var(--rose-dark));
  text-decoration: underline;
}

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .app-container {
    padding: var(--space-md) var(--space-sm);
  }

  .card {
    padding: var(--space-md);
    border-radius: 20px;
  }

  .card-lg {
    padding: var(--space-md);
    border-radius: 20px;
  }

  .form-title {
    font-size: 1.5rem;
  }

  .love-letter-content {
    padding: var(--space-md);
    font-size: 1rem;
  }

  .btn {
    padding: 14px 28px;
    font-size: 1rem;
    border-radius: 14px;
  }

  <span class="heart-float">&#10084;</span>

<!-- Main App -->

        <span class="divider-heart" aria-hidden="true">&#10084;</span>

          &#128203; 复制链接

          &#128279; 分享

        </button>

</div>

<script>
(function() {
  'use strict';

  // ===== DOM References =====
  var formScene = document.getElementById('formScene');
  var envelopeScene = document.getElementById('envelopeScene');
  var viewScene = document.getElementById('viewScene');
  var loveLetterForm = document.getElementById('loveLetterForm');
  var shareBox = document.getElementById('shareBox');
  var shareLinkText = document.getElementById('shareLinkText');
  var copiedToast = document.getElementById('copiedToast');
  var charCount = document.getElementById('charCount');
  var messageTextarea = document.getElementById('message');
  var confettiContainer = document.getElementById('confettiContainer');
  var recipientNameInput = document.getElementById('recipientName');
  var recipientHint = document.getElementById('recipientHint');

  // Store the pending share URL (for preview button)
  var pendingShareUrl = '';
  
  // Store current letter data for reply
  var currentLetterData = null;

  // ===== Character count =====
  messageTextarea.addEventListener('input', function() {
    charCount.textContent = messageTextarea.value.length;
  });

  // ===== LZ-String Compression (for shorter URLs) =====
  var LZUtil = {
    compress: function(uncompressed) {
      if (typeof uncompressed !== 'string') return '';
      var context_dictionary = {};
      var context_c = '';
      var context_wc = '';
      var context_w = '';
      var context_dictSize = 3;
      var context_numBits = 2;
      var context_buffer = [];
      var context_data_val = 0;
      var context_data_position = 0;
      
      function context_writeBit(value) {
        context_data_val = (context_data_val << 1) | value;
        context_data_position++;
        if (context_data_position === 16) {
          context_buffer.push(String.fromCharCode(context_data_val));
          context_data_val = 0;
          context_data_position = 0;
        }
      }
      
      function context_writeBits(value, numBits) {
        for (var i = 0; i < numBits; i++) {
          context_writeBit(value & 1);
          value = value >> 1;
        }
      }
      
      for (var ii = 0; ii < uncompressed.length; ii++) {
        context_c = uncompressed.charAt(ii);
        if (!Object.prototype.hasOwnProperty.call(context_dictionary, context_c)) {
          context_dictionary[context_c] = context_dictSize++;
        }
        context_wc = context_w + context_c;
        if (Object.prototype.hasOwnProperty.call(context_dictionary, context_wc)) {
          context_w = context_wc;
        } else {
          if (context_w.charCodeAt(0) < 256) {
            context_writeBits(0, context_numBits);
            context_writeBits(context_w.charCodeAt(0), 8);
          } else {
            context_writeBits(1, context_numBits);
            context_writeBits(context_w.charCodeAt(0), 16);
          }
          context_dictionary[context_wc] = context_dictSize++;
          context_w = String(context_c);
        }
      }
      
      if (context_w !== '') {
        if (context_w.charCodeAt(0) < 256) {
          context_writeBits(0, context_numBits);
          context_writeBits(context_w.charCodeAt(0), 8);
        } else {
          context_writeBits(1, context_numBits);
          context_writeBits(context_w.charCodeAt(0), 16);
        }
      }
      
      context_writeBits(2, context_numBits);
      
      if (context_data_position > 0) {
        context_buffer.push(String.fromCharCode(context_data_val));
      }
      
      return context_buffer.join('');
    },
    
    decompress: function(compressed) {
      if (!compressed || compressed.length === 0) return '';
      var dictionary = [];
      var dictSize = 4;
      var numBits = 3;
      var entry = '';
      var result = [];
      var data = { val: compressed.charCodeAt(0), position: 16, index: 1 };
      
      function readBits(numBits) {
        var result = 0;
        for (var i = 0; i < numBits; i++) {
          if (data.position === 0) {
            data.val = compressed.charCodeAt(data.index++);
            data.position = 16;
          }
          result |= ((data.val >> (data.position - 1)) & 1) << (numBits - i - 1);
          data.position--;
        }
        return result;
      }
      
      for (var i = 0; i < 3; i++) {
        dictionary[i] = i;
      }
      
      var bits = readBits(numBits);
      switch (bits) {
        case 0: 
          bits = readBits(8);
          entry = String.fromCharCode(bits);
          break;
        case 1:
          bits = readBits(16);
          entry = String.fromCharCode(bits);
          break;
        case 2:
          return '';
      }
      dictionary[3] = entry;
      result.push(entry);
      var w = entry;
      
      while (true) {
        if (data.index >= compressed.length) break;
        
        var c = readBits(numBits);
        switch (c) {
          case 0:
            bits = readBits(8);
            entry = String.fromCharCode(bits);
            break;
          case 1:
            bits = readBits(16);
            entry = String.fromCharCode(bits);
            break;
          case 2:
            return result.join('');
        }
        
        if (!dictionary[c]) {
          entry = w + w.charAt(0);
        } else {
          entry = dictionary[c];
        }
        
        result.push(entry);
        dictionary[dictSize++] = w + entry.charAt(0);
        w = entry;
      }
      
      return result.join('');
    }
  };

  // ===== Encode data to hash string (with compression for shorter URL) =====
  function encodeData(recipient, message, sender) {
    // Use minimal JSON structure with single-char keys
    var compact = {
      r: recipient,
      m: message,
      s: sender || ''
    };
    var json = JSON.stringify(compact);
    
    try {
      // Compress the JSON string using LZ compression
      var compressed = LZUtil.compress(json);
      // Encode to base64 and make URL-safe
      var encoded = btoa(unescape(encodeURIComponent(compressed)));
      encoded = encoded.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      return encoded;
    } catch (e) {
      // Fallback: simple base64 without compression
      var encoded = btoa(unescape(encodeURIComponent(json)));
      return encoded.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
  }
  
  // ===== Parse URL hash to data (with decompression) =====
  function parseHash() {
    var hash = window.location.hash;
    if (!hash || hash === '#') return null;

    var encoded = hash.substring(1);

    try {
      // Reverse URL-safe base64: -_ -> +/
      encoded = encoded.replace(/-/g, '+').replace(/_/g, '/');
      // Add back padding
      while (encoded.length % 4 !== 0) {
        encoded += '=';
      }
      
      // Decode from base64
      var decoded = decodeURIComponent(escape(atob(encoded)));
      
      // Try to decompress first (new format with LZ compression)
      try {
        var json = LZUtil.decompress(decoded);
        var data = JSON.parse(json);
        if (data.r && data.m) {
          return data;
        }
      } catch (decompressError) {
        // If decompression fails, try direct JSON parse (old format without compression)
        // The decoded string might already be JSON
        try {
          var data = JSON.parse(decoded);
          if (data.r && data.m) {
            return data;
          }
        } catch (jsonError) {
          // Both methods failed
          return null;
        }
      }
      
      return null;
    } catch (e) {
      return null;
    }
  }

  // ===== Build shareable URL =====
  function buildShareUrl(recipient, message, sender) {
    var hash = encodeData(recipient, message, sender);
    // Use href.split to get the correct base URL (works for both http:// and file://)
    var baseUrl = window.location.href.split('#')[0];
    var url = baseUrl + '#' + hash;
    return url;
  }

  // ===== Show view scene (first show envelope) =====
  function showViewScene(data) {
    formScene.classList.remove('active');
    envelopeScene.classList.add('active');
    viewScene.classList.remove('active');
    shareBox.style.display = 'none';
    
    // Store letter data for reply
    currentLetterData = data;

    // Pre-fill recipient name with sender's name from original letter
    var replySender = data.s || '匿名';
    recipientNameInput.value = replySender;
    recipientNameInput.readOnly = true;
    recipientNameInput.style.background = 'hsl(30 30% 96%)';
    recipientHint.style.display = 'block';
  }
  
  // ===== Open envelope animation =====
  window.openEnvelope = function() {
    if (!currentLetterData) return;
    
    var envelopeContainer = document.getElementById('envelopeContainer');
    envelopeContainer.classList.add('opened');
    
    // Wait for envelope animation, then show letter
    setTimeout(function() {
      envelopeScene.classList.remove('active');
      viewScene.classList.add('active');
      
      document.getElementById('displayRecipient').textContent = '亲爱的 ' + currentLetterData.r;
      
      // Typewriter effect: reveal text character by character
      var msgEl = document.getElementById('displayMessage');
      startTypewriter(msgEl, currentLetterData.m);
      
      // Hide footer initially, show after typewriter completes
      var footerEl = document.getElementById('displayFooter');
      var senderName = currentLetterData.s || '匿名';
      var now = new Date();
      var dateStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
      footerEl.innerHTML =
        '<span class="sender-name">— ' + escapeHTML(senderName) + '</span>' +
        '<div class="love-letter-date">' + dateStr + '</div>';
      footerEl.style.opacity = '0';
      footerEl.style.transition = 'opacity 1s ease';
      
      triggerConfetti();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 1200);
  };
  
  // ===== Click/touch to create hearts =====
  function createClickHeart(x, y) {
    var hearts = ['&#10084;', '&#9825;', '&#128150;', '&#128151;', '&#128152;'];
    var heart = document.createElement('span');
    heart.className = 'click-heart';
    heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
    heart.style.position = 'fixed';
    heart.style.left = x + 'px';
    heart.style.top = y + 'px';
    heart.style.fontSize = (20 + Math.random() * 16) + 'px';
    heart.style.pointerEvents = 'none';
    heart.style.zIndex = '100';
    heart.style.animation = 'clickHeartFloat 2s ease-out forwards';
    
    document.body.appendChild(heart);
    
    setTimeout(function() {
      if (heart.parentNode) {
        heart.parentNode.removeChild(heart);
      }
    }, 2000);
  }
  
  // Add click/touch event listeners
  var isViewingMode = false;
  
  document.addEventListener('click', function(e) {
    // Only create hearts when viewing a letter (not in form mode)
    if (viewScene.classList.contains('active')) {
      createClickHeart(e.clientX, e.clientY);
    }
  });
  
  document.addEventListener('touchstart', function(e) {
    // Only create hearts when viewing a letter
    if (viewScene.classList.contains('active')) {
      for (var i = 0; i < e.touches.length; i++) {
        createClickHeart(e.touches[i].clientX, e.touches[i].clientY);
      }
    }
  }, { passive: true });

  // ===== Typewriter: reveal text character by character with fade-in =====
  var typewriterTimer = null;

  function startTypewriter(el, text) {
    // Clear any existing animation
    if (typewriterTimer) clearTimeout(typewriterTimer);
    el.innerHTML = '';

    // Add scroll unfurl decoration
    var unfurl = document.createElement('div');
    unfurl.className = 'scroll-unfurl';
    el.appendChild(unfurl);

    // Create container for characters
    var charContainer = document.createElement('div');
    charContainer.className = 'char-container';
    el.appendChild(charContainer);

    // Split text into lines first, then into characters
    var lines = text.split('\n');
    var allChars = [];
    
    for (var i = 0; i < lines.length; i++) {
      for (var j = 0; j < lines[i].length; j++) {
        allChars.push({ type: 'char', value: lines[i][j] });
      }
      if (i < lines.length - 1) {
        allChars.push({ type: 'newline' });
      }
    }

    // Reveal characters one by one (no cursor)
    var footerEl = document.getElementById('displayFooter');
    var idx = 0;

    function revealNext() {
      if (idx < allChars.length) {
        if (allChars[idx].type === 'newline') {
          // Insert line break
          charContainer.appendChild(document.createElement('br'));
        } else {
          // Create character span with fade-in effect
          var charSpan = document.createElement('span');
          charSpan.className = 'typewriter-char';
          charSpan.textContent = allChars[idx].value;
          charContainer.appendChild(charSpan);
        }
        
        idx++;
        // Slower speed: 0.8x of original (100-187.5ms per character)
        var delay = (80 + Math.random() * 70) * 1.25;
        typewriterTimer = setTimeout(revealNext, delay);
      } else {
        // All characters revealed, show footer after a brief delay
        typewriterTimer = setTimeout(function() {
          // Show footer
          if (footerEl) {
            footerEl.style.opacity = '1';
          }
        }, 800);
      }
    }

    // Start after a short initial delay
    typewriterTimer = setTimeout(revealNext, 600);
  }

  // ===== Show form scene =====
  function showFormScene() {
    if (typewriterTimer) clearTimeout(typewriterTimer);
    envelopeScene.classList.remove('active');
    viewScene.classList.remove('active');
    formScene.classList.add('active');
    shareBox.style.display = 'none';
    loveLetterForm.reset();
    charCount.textContent = '0';
    pendingShareUrl = '';
    
    // Reset recipient input state (remove reply lock)
    recipientNameInput.readOnly = false;
    recipientNameInput.style.background = 'hsl(var(--warm-white))';
    recipientHint.style.display = 'none';
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ===== Form submission - generate link without navigating =====
  loveLetterForm.addEventListener('submit', function(e) {
    e.preventDefault();

    var recipient = document.getElementById('recipientName').value.trim();
    var message = messageTextarea.value.trim();
    var sender = document.getElementById('senderName').value.trim();

    if (!recipient || !message) {
      loveLetterForm.style.animation = 'none';
      loveLetterForm.offsetHeight;
      loveLetterForm.style.animation = 'shake 0.5s ease';
      return;
    }

    // Build URL and show share box (don't navigate away)
    var url = buildShareUrl(recipient, message, sender);
    pendingShareUrl = url;
    shareLinkText.textContent = url;
    shareBox.style.display = 'block';
    shareBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  // Add shake keyframe dynamically
  var shakeStyle = document.createElement('style');
  shakeStyle.textContent =
    '@keyframes shake {' +
    '0%, 100% { transform: translateX(0); }' +
    '10%, 50%, 90% { transform: translateX(-4px); }' +
    '30%, 70% { transform: translateX(4px); }' +
    '}';
  document.head.appendChild(shakeStyle);

  // ===== Preview letter (navigate to view) =====
  window.previewLetter = function() {
    if (!pendingShareUrl) return;

    var hashIndex = pendingShareUrl.indexOf('#');
    if (hashIndex !== -1) {
      window.location.hash = pendingShareUrl.substring(hashIndex + 1);
    }
  };

  // ===== Copy link (form page share box) =====
  window.copyLink = function() {
    var url = shareLinkText.textContent;
    copyToClipboard(url, copiedToast);
  };

  // ===== Copy link (view page) =====
  window.copyCurrentLink = function() {
    var viewActions = document.querySelector('.view-actions');
    var toast = document.createElement('span');
    toast.textContent = '✓ 已复制！';
    toast.style.cssText =
      'display:inline;animation:fadeInOut 2s ease forwards;color:hsl(150 60% 40%);font-weight:600;font-size:0.8rem;';

    viewActions.appendChild(toast);
    setTimeout(function() {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 2200);

    copyToClipboard(window.location.href);
  };

  function copyToClipboard(text, toastEl) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        if (toastEl) showCopiedToast(toastEl);
      }).catch(function() {
        fallbackCopy(text, toastEl);
      });
    } else {
      fallbackCopy(text, toastEl);
    }
  }

  function fallbackCopy(text, toastEl) {
    var textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      if (toastEl) showCopiedToast(toastEl);
    } catch (e) {
      alert('链接：\n' + text);
    }
    document.body.removeChild(textarea);
  }

  function showCopiedToast(toastEl) {
    toastEl.style.display = 'inline';
    toastEl.style.animation = 'none';
    toastEl.offsetHeight;
    toastEl.style.animation = 'fadeInOut 2s ease forwards';
    setTimeout(function() {
      toastEl.style.display = 'none';
    }, 2000);
  }

  // ===== Share current view (native share API) =====
  window.shareCurrent = function() {
    var url = window.location.href;
    if (navigator.share) {
      navigator.share({
        title: '一封写给你的情书',
        text: '你收到了一封特别的情书，快打开看看吧~',
        url: url
      }).catch(function() {});
    } else {
      copyToClipboard(url);
      alert('链接已复制！快去发给 TA 吧~');
    }
  };

  // ===== Go back to create form (reply mode) =====
  window.goToCreate = function() {
    if (typewriterTimer) clearTimeout(typewriterTimer);
    
    // Keep the currentLetterData for reply BEFORE clearing
    var replyData = currentLetterData;
    console.log('goToCreate called, currentLetterData:', replyData);
    
    window.location.hash = '';
    
    // Show form scene first (this will reset the form)
    envelopeScene.classList.remove('active');
    viewScene.classList.remove('active');
    formScene.classList.add('active');
    shareBox.style.display = 'none';
    loveLetterForm.reset();
    charCount.textContent = '0';
    pendingShareUrl = '';
    
    // Use requestAnimationFrame to ensure DOM is updated before setting values
    requestAnimationFrame(function() {
      if (replyData) {
        console.log('Setting up reply mode for sender:', replyData.s);
        var replySender = replyData.s || '匿名';
        recipientNameInput.value = replySender;
        recipientNameInput.readOnly = true;
        recipientNameInput.setAttribute('readonly', 'readonly');
        recipientNameInput.style.background = '#f0e6e6';
        recipientNameInput.style.cursor = 'not-allowed';
        recipientNameInput.style.opacity = '0.7';
        recipientHint.style.display = 'block';
        console.log('Set recipientNameInput.value to:', recipientNameInput.value);
        
        // Double-check after a small delay to ensure value sticks
        setTimeout(function() {
          if (recipientNameInput.value !== replySender) {
            console.warn('Value was reset, re-applying...');
            recipientNameInput.value = replySender;
          }
        }, 50);
      } else {
        console.log('No replyData, setting normal mode');
        // Normal mode: ensure recipient is editable
        recipientNameInput.readOnly = false;
        recipientNameInput.removeAttribute('readonly');
        recipientNameInput.style.background = 'hsl(var(--warm-white))';
        recipientNameInput.style.cursor = '';
        recipientNameInput.style.opacity = '1';
        recipientHint.style.display = 'none';
      }
    });
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // ===== Confetti hearts (falling from sky with gradient) =====
  var heartFallTimer = null;
  
  function triggerConfetti() {
    // Clear any existing confetti
    if (heartFallTimer) clearTimeout(heartFallTimer);
    confettiContainer.innerHTML = '';
    
    var hearts = ['&#10084;', '&#9825;', '&#128150;', '&#128151;', '&#128152;'];
    var startTime = Date.now();
    var duration = 20000; // 20 seconds total
    var fadeOutStart = 10000; // Start fading after 10 seconds
    
    function createHeart() {
      var elapsed = Date.now() - startTime;
      
      // Stop creating hearts after duration
      if (elapsed > duration) {
        // Clean up remaining hearts
        setTimeout(function() {
          confettiContainer.innerHTML = '';
        }, 10000);
        return;
      }
      
      var heart = document.createElement('span');
      heart.className = 'confetti-heart';
      heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
      
      // Position: 0-100% from left
      var position = Math.random() * 100;
      heart.style.left = position + '%';
      
      // Size and opacity based on position
      // Left side (0-30%) and right side (70-100%): larger and darker
      // Center (30-70%): smaller and lighter
      var size, opacity, colorDepth;
      if (position < 30 || position > 70) {
        // Side hearts: larger (18-30px), darker opacity (0.6-0.8)
        size = 18 + Math.random() * 12;
        opacity = 0.6 + Math.random() * 0.2;
      } else {
        // Center hearts: smaller (10-18px), lighter opacity (0.3-0.5)
        size = 10 + Math.random() * 8;
        opacity = 0.3 + Math.random() * 0.2;
      }
      
      heart.style.fontSize = size + 'px';
      heart.style.opacity = opacity;
      
      // Animation duration: longer for sides (10-15s), shorter for center (7-10s)
      var animDuration = (position < 30 || position > 70) ? 
        (10 + Math.random() * 5) : 
        (7 + Math.random() * 3);
      heart.style.animationDuration = animDuration + 's';
      heart.style.animationDelay = '0s';
      
      confettiContainer.appendChild(heart);
      
      // Remove heart after animation completes
      setTimeout(function() {
        if (heart.parentNode) {
          heart.parentNode.removeChild(heart);
        }
      }, animDuration * 1000);
    }
    
    // Create hearts at intervals
    function scheduleHearts() {
      var elapsed = Date.now() - startTime;
      
      if (elapsed > duration) return;
      
      // Calculate how many hearts to create per batch
      // Start with more, gradually reduce
      var progress = elapsed / fadeOutStart;
      var heartsPerBatch;
      
      if (elapsed < fadeOutStart) {
        // First 10 seconds: normal rate (3-5 hearts per batch)
        heartsPerBatch = 3 + Math.floor(Math.random() * 3);
      } else {
        // After 10 seconds: gradually reduce
        var reductionFactor = 1 - ((elapsed - fadeOutStart) / (duration - fadeOutStart));
        heartsPerBatch = Math.max(1, Math.floor(3 * reductionFactor));
      }
      
      // Create hearts
      for (var i = 0; i < heartsPerBatch; i++) {
        createHeart();
      }
      
      // Schedule next batch (every 300-500ms)
      heartFallTimer = setTimeout(scheduleHearts, 300 + Math.random() * 200);
    }
    
    // Start the heart falling
    scheduleHearts();
  }

  // ===== Escape HTML =====
  function escapeHTML(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ===== Hash change handler =====
  function handleHashChange() {
    var data = parseHash();
    if (data) {
      showViewScene(data);
    } else {
      showFormScene();
    }
  }

  window.addEventListener('hashchange', handleHashChange);

  // ===== Initial load =====
  if (window.location.hash && window.location.hash !== '#') {
    var data = parseHash();
    if (data) {
      showViewScene(data);
    } else {
      showFormScene();
    }
  } else {
    showFormScene();
  }

})();
</script>
